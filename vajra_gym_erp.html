
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM ERP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --accent:#22c55e;
  --text:#f8fafc;
  --muted:#94a3b8;
  --danger:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:#020617;
  padding:12px;
  border-bottom:1px solid #1e293b;
}
header h1{
  margin:0;
  font-size:20px;
  text-align:center;
}
.container{
  padding:10px;
}
.card{
  background:var(--card);
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
  border:1px solid #1f2937;
}
.card h2{
  margin-top:0;
  font-size:18px;
}
input,select,textarea,button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  font-size:15px;
}
input,select,textarea{
  background:#1e293b;
  color:white;
}
input.uppercase{
  text-transform:uppercase;
}
button{
  background:var(--accent);
  color:black;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:.9;
}
.member{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.member small{
  color:var(--muted);
}
.actions{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.actions button{
  flex:1;
}
.deleteBtn{
  background:var(--danger);
  color:white;
}
.stat{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#020617;
  border-top:1px solid #1e293b;
}
.bottom-nav button{
  border-radius:0;
  margin:0;
  background:none;
  color:white;
  padding:14px;
}
.page{
  display:none;
  padding-bottom:80px;
}
.page.active{
  display:block;
}
.success{
  background:#14532d;
  color:#bbf7d0;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.error{
  background:#7f1d1d;
  color:#fecaca;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.hidden{
  display:none !important;
}
.top-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-top:10px;
}
.top-actions small{
  color:var(--muted);
}
.logoutBtn{
  width:auto;
  min-width:90px;
  margin-top:0;
  padding:9px 12px;
  background:#334155;
  color:white;
}
.login-wrap{
  min-height:calc(100vh - 65px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.login-card{
  width:100%;
  max-width:430px;
  margin:0;
}
.login-card h2{
  text-align:center;
}
.login-card.warning-blink{
  animation: warningBlink var(--blink-speed,.18s) linear var(--blink-count,16);
}
@keyframes warningBlink{
  0%{background:#7f1d1d; box-shadow:0 0 0 0 rgba(239,68,68,.95)}
  45%{background:#111827; box-shadow:0 0 28px 8px rgba(239,68,68,.75)}
  100%{background:#dc2626; box-shadow:0 0 10px 2px rgba(239,68,68,.95)}
}
.nav-member-only{
  display:none;
}
.workout-row{
  padding:10px;
  margin-top:8px;
  background:#1e293b;
  border-radius:10px;
}
.workout-row strong{
  display:block;
}
.workout-row small{
  color:var(--muted);
}
.workout-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.workout-grid input,
.workout-grid select{
  margin-top:0;
}
.workout-meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}
.workout-meta label{
  color:var(--muted);
  font-size:12px;
}
.workout-meta input{
  margin-top:4px;
}
.doneBadge{
  display:inline-block;
  margin-top:8px;
  padding:5px 8px;
  border-radius:8px;
  background:#14532d;
  color:#bbf7d0;
  font-size:12px;
  font-weight:bold;
}
.muted{
  color:var(--muted);
}
.timerText{
  display:inline-block;
  margin-top:8px;
  color:#fde68a;
  font-weight:bold;
}
@media(max-width:520px){
  .workout-grid,
  .workout-meta{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>
  <h1>🏋️ GYM ERP</h1>
  <div id="appTopActions" class="top-actions hidden">
    <small id="currentUserLabel"></small>
    <button class="logoutBtn" onclick="logout()">Logout</button>
  </div>
</header>

<div id="loginScreen" class="login-wrap">
  <div id="loginCard" class="card login-card">
    <h2>Login</h2>
    <input type="text" id="loginUsername" class="uppercase" placeholder="USER NAME" oninput="forceUppercase(this)">
    <input type="password" id="loginPassword" inputmode="numeric" pattern="[0-9]*" placeholder="NUMBER PASSWORD" oninput="forceNumbers(this)">
    <button onclick="login()">Open App</button>
    <div id="loginMsg"></div>
  </div>
</div>

<div id="appShell" class="container hidden">

<div id="dashboardPage" class="page active">
  <div class="card">
    <h2>Dashboard</h2>
    <div class="stat">
      <span>Total Members</span>
      <strong id="totalMembers">0</strong>
    </div>
    <div class="stat">
      <span>Active Members</span>
      <strong id="activeMembers">0</strong>
    </div>
    <div class="stat">
      <span>Expired Members</span>
      <strong id="expiredMembers">0</strong>
    </div>
  </div>

  <div class="card">
    <h2>Today Collections</h2>
    <div class="stat">
      <span>₹ Collection</span>
      <strong id="todayCollection">0</strong>
    </div>
  </div>
</div>

<div id="membersPage" class="page">
  <div class="card">
    <h2>Add Member</h2>

    <input type="text" id="memberName" class="uppercase" placeholder="MEMBER NAME" oninput="forceUppercase(this)">
    <input type="text" id="memberPhone" placeholder="Phone Number">
    <input type="number" id="memberFee" placeholder="Monthly Fee">
    <input type="password" id="memberPassword" inputmode="numeric" pattern="[0-9]*" placeholder="NUMBER LOGIN PASSWORD" oninput="forceNumbers(this)">

    <select id="memberPlan">
      <option value="1 Month">1 Month</option>
      <option value="3 Months">3 Months</option>
      <option value="6 Months">6 Months</option>
      <option value="1 Year">1 Year</option>
    </select>

    <input type="date" id="joinDate">

    <button onclick="saveMember()">Save Member</button>

    <div id="msg"></div>
  </div>

  <div class="card">
    <h2>Search Members</h2>
    <input type="text" id="searchInput" placeholder="Search Name / Phone" onkeyup="loadMembers()">
  </div>

  <div id="memberList"></div>
</div>

<div id="paymentsPage" class="page">
  <div class="card">
    <h2>Payment Entry</h2>

    <select id="paymentMember"></select>

    <input type="number" id="paymentAmount" placeholder="Amount">

    <button onclick="savePayment()">Save Payment</button>
  </div>

  <div class="card">
    <h2>Recent Payments</h2>
    <div id="paymentList"></div>
  </div>
</div>

<div id="workoutPage" class="page">
  <div class="card">
    <h2>Workout</h2>
    <div id="workoutMemberPickerWrap">
      <select id="workoutMemberSelect" onchange="changeWorkoutMember()"></select>
    </div>
    <div class="stat">
      <span>Member</span>
      <strong id="workoutMemberName">-</strong>
    </div>
    <div class="stat">
      <span>Status</span>
      <strong id="workoutMemberStatus">-</strong>
    </div>
    <select id="workoutViewDay" onchange="renderWorkouts()">
      <option value="1">SHOW DAY 1</option>
      <option value="2">SHOW DAY 2</option>
      <option value="3">SHOW DAY 3</option>
      <option value="4">SHOW DAY 4</option>
      <option value="5">SHOW DAY 5</option>
      <option value="6">SHOW DAY 6</option>
    </select>
  </div>

  <div id="workoutEditorCard" class="card">
    <h2>Add / Edit Workout</h2>
    <input type="hidden" id="workoutEditId">
    <select id="workoutDay">
      <option value="1">DAY 1</option>
      <option value="2">DAY 2</option>
      <option value="3">DAY 3</option>
      <option value="4">DAY 4</option>
      <option value="5">DAY 5</option>
      <option value="6">DAY 6</option>
    </select>
    <input type="text" id="workoutFocus" class="uppercase" placeholder="FOCUS" oninput="forceUppercase(this)">
    <input type="text" id="workoutName" class="uppercase" placeholder="WORKOUT NAME" oninput="forceUppercase(this)">
    <select id="workoutType" onchange="toggleWorkoutFields()">
      <option value="strength">WEIGHTS / REPS</option>
      <option value="cardio">CYCLING / RUNNING</option>
    </select>
    <div id="strengthFields" class="workout-grid">
      <input type="number" id="targetWeight" placeholder="Target Weight">
      <input type="number" id="targetReps" placeholder="Target Reps / Times">
    </div>
    <div id="cardioFields" class="workout-grid hidden">
      <input type="number" id="targetRounds" placeholder="Target Rounds">
      <input type="number" id="targetTime" placeholder="Target Time Minutes">
    </div>
    <button onclick="saveWorkout()">Save Workout</button>
    <button onclick="loadSixDayPlan()">Load 6 Day Plan</button>
    <div id="workoutMsg"></div>
  </div>

  <div class="card">
    <h2>Workout List</h2>
    <div id="workoutList"></div>
  </div>
</div>

<div id="attendancePage" class="page">
  <div class="card">
    <h2>Attendance</h2>
    <select id="attendanceMemberSelect"></select>
    <button onclick="markAttendanceForSelectedMember()">Mark Attendance</button>
  </div>

  <div class="card">
    <h2>Recent Attendance</h2>
    <div id="attendanceList"></div>
  </div>
</div>

</div>

<div id="bottomNav" class="bottom-nav hidden">
  <button class="nav-owner-staff" onclick="showPage('dashboardPage')">Dashboard</button>
  <button class="nav-owner-staff" onclick="showPage('membersPage')">Members</button>
  <button class="nav-owner-staff" onclick="showPage('paymentsPage')">Payments</button>
  <button class="nav-owner-staff" onclick="showPage('workoutPage')">Workout</button>
  <button class="nav-owner-staff" onclick="showPage('attendancePage')">Attendance</button>
  <button class="nav-member-only" onclick="showPage('workoutPage')">Workout</button>
</div>

<script>
const SUPABASE_URL = "https://ubxybkfxvxlsowjhxvns.supabase.co";
const SUPABASE_KEY = "sb_publishable_YcTzQnn9jB0cHdBQuMOzNw_85nWbB92";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let selectedWorkoutMember = null;
let workoutTimers = {};

function forceUppercase(input){
  input.value = input.value.toUpperCase();
}

function forceNumbers(input){
  input.value = input.value.replace(/\D/g,'');
}

function showExpiredLoginWarning(member){
  const msg = document.getElementById('loginMsg');
  const card = document.getElementById('loginCard');
  const name = member?.name ? String(member.name).toUpperCase() : 'MEMBER';

  msg.innerHTML = `<div class="error">${name} MEMBERSHIP EXPIRED. WORKOUT ACCESS BLOCKED.</div>`;
  card.style.setProperty('--blink-count', String(18 + Math.floor(Math.random() * 12)));
  card.style.setProperty('--blink-speed', `${0.11 + Math.random() * 0.11}s`);
  card.classList.remove('warning-blink');
  void card.offsetWidth;
  card.classList.add('warning-blink');
}

async function getMemberForUser(user){
  if(!user?.memberId && !user?.username) return null;

  let query = sb.from('gym_members').select('*');

  if(user.memberId){
    query = query.eq('id', user.memberId);
  }else{
    query = query.ilike('name', user.username);
  }

  const { data, error } = await query.limit(1).maybeSingle();

  if(error){
    console.log(error);
    return null;
  }

  return data;
}

async function findUser(username, password){
  const { data, error } = await sb
    .from('gym_users')
    .select('*')
    .eq('username', username)
    .eq('password', password)
    .maybeSingle();

  if(error){
    alert(error.message);
    return null;
  }

  if(!data) return null;

  return {
    username:data.username,
    password:data.password,
    role:data.role,
    displayName:data.display_name,
    memberId:data.member_id
  };
}

function isMemberExpired(member){
  if(!member?.expiry_date) return false;
  return new Date(member.expiry_date) < new Date();
}

async function login(){
  const username = document.getElementById('loginUsername').value.trim().toUpperCase();
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMsg');
  msg.innerHTML = '';

  const user = await findUser(username, password);

  if(!user){
    msg.innerHTML = '<div class="error">Invalid user name or password</div>';
    return;
  }

  if(user.role === 'member'){
    const member = await getMemberForUser(user);

    if(isMemberExpired(member)){
      showExpiredLoginWarning(member);
      return;
    }
  }

  currentUser = user;

  if(user.role === 'member'){
    await markAttendance(user.memberId, 'LOGIN');
  }

  openAppForUser();
}

function logout(){
  currentUser = null;
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginMsg').innerHTML = '';
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('bottomNav').classList.add('hidden');
  document.getElementById('appTopActions').classList.add('hidden');
}

function openAppForUser(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');
  document.getElementById('appTopActions').classList.remove('hidden');
  document.getElementById('currentUserLabel').innerText =
    `${currentUser.displayName || currentUser.username} (${currentUser.role.toUpperCase()})`;

  const isMember = currentUser.role === 'member';

  document.querySelectorAll('.nav-owner-staff').forEach(btn=>{
    btn.classList.toggle('hidden', isMember);
  });

  document.querySelectorAll('.nav-member-only').forEach(btn=>{
    btn.style.display = isMember ? 'block' : 'none';
  });

  showPage(isMember ? 'workoutPage' : 'dashboardPage');
}

function canOpenPage(id){
  if(!currentUser) return false;

  if(currentUser.role === 'member'){
    return id === 'workoutPage';
  }

  return ['dashboardPage','membersPage','paymentsPage','workoutPage','attendancePage'].includes(id);
}

function todayText(){
  return new Date().toISOString().split('T')[0];
}

function playTimerAlarm(){
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  oscillator.type = 'square';
  oscillator.frequency.value = 880;
  oscillator.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.35, audioCtx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 1);
}

function showPage(id){
  if(!canOpenPage(id)){
    alert('You do not have access to this page');
    return;
  }

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id === 'membersPage'){
    loadMembers();
  }

  if(id === 'paymentsPage'){
    loadPaymentMembers();
    loadPayments();
  }

  if(id === 'dashboardPage'){
    loadDashboard();
  }

  if(id === 'workoutPage'){
    loadWorkoutPage();
  }

  if(id === 'attendancePage'){
    loadAttendancePage();
  }
}

async function saveMember(){

  const name = document.getElementById('memberName').value.trim().toUpperCase();
  const phone = document.getElementById('memberPhone').value.trim();
  const fee = parseFloat(document.getElementById('memberFee').value || 0);
  const password = document.getElementById('memberPassword').value.trim();
  const plan = document.getElementById('memberPlan').value;
  const join_date = document.getElementById('joinDate').value;

  if(!name || !phone || !password){
    alert("Enter member details and login password");
    return;
  }

  if(!/^\d+$/.test(password)){
    alert("Password must be numbers only");
    return;
  }

  let months = 1;

  if(plan === '3 Months') months = 3;
  if(plan === '6 Months') months = 6;
  if(plan === '1 Year') months = 12;

  const expiry = new Date(join_date);
  expiry.setMonth(expiry.getMonth() + months);

  const expiry_date = expiry.toISOString().split('T')[0];

  const { data:newMember, error } = await sb.from('gym_members').insert([{
    name,
    phone,
    monthly_fee: fee,
    plan,
    join_date,
    expiry_date,
    status: 'ACTIVE'
  }]).select().single();

  if(error){
    alert(error.message);
    return;
  }

  const { error:userError } = await sb
    .from('gym_users')
    .upsert([{
      username:name,
      password,
      role:'member',
      display_name:name,
      member_id:newMember.id
    }], { onConflict:'username' });

  if(userError){
    alert(userError.message);
    return;
  }

  document.getElementById('msg').innerHTML = '<div class="success">Member Saved Successfully</div>';

  document.getElementById('memberName').value = '';
  document.getElementById('memberPhone').value = '';
  document.getElementById('memberFee').value = '';
  document.getElementById('memberPassword').value = '';

  loadMembers();
  loadDashboard();
}

async function loadMembers(){

  const search = document.getElementById('searchInput').value.trim();

  let query = sb
    .from('gym_members')
    .select('*')
    .order('id',{ascending:false});

  if(search){
    query = query.or(`name.ilike.%${search}%,phone.ilike.%${search}%`);
  }

  const { data, error } = await query;

  if(error){
    console.log(error);
    return;
  }

  const div = document.getElementById('memberList');
  div.innerHTML = '';

  data.forEach(m => {

    const expired = new Date(m.expiry_date) < new Date();

    div.innerHTML += `
      <div class="member">
        <strong>${String(m.name || '').toUpperCase()}</strong><br>
        <small>${m.phone}</small><br><br>

        Plan : ${m.plan}<br>
        Fee : ₹${m.monthly_fee}<br>
        Join : ${m.join_date}<br>
        Expiry : ${m.expiry_date}<br>

        <strong style="color:${expired ? '#ef4444':'#22c55e'}">
          ${expired ? 'EXPIRED':'ACTIVE'}
        </strong>

        <div class="actions">
          <button onclick="renewMember(${m.id})">Renew</button>
          <button class="deleteBtn" onclick="deleteMember(${m.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

async function deleteMember(id){

  if(!confirm('Delete Member?')) return;

  const { error } = await sb
    .from('gym_members')
    .delete()
    .eq('id',id);

  if(error){
    alert(error.message);
    return;
  }

  loadMembers();
  loadDashboard();
}

async function renewMember(id){

  const months = prompt("Enter renewal months");

  if(!months) return;

  const { data } = await sb
    .from('gym_members')
    .select('*')
    .eq('id',id)
    .single();

  const expiry = new Date(data.expiry_date);
  expiry.setMonth(expiry.getMonth() + parseInt(months));

  const newExpiry = expiry.toISOString().split('T')[0];

  await sb
    .from('gym_members')
    .update({
      expiry_date:newExpiry,
      status:'ACTIVE'
    })
    .eq('id',id);

  loadMembers();
  loadDashboard();
}

async function loadDashboard(){

  const { data } = await sb
    .from('gym_members')
    .select('*');

  const today = new Date();

  let active = 0;
  let expired = 0;

  data.forEach(m=>{
    if(new Date(m.expiry_date) >= today){
      active++;
    }else{
      expired++;
    }
  });

  document.getElementById('totalMembers').innerText = data.length;
  document.getElementById('activeMembers').innerText = active;
  document.getElementById('expiredMembers').innerText = expired;

  const d = new Date().toISOString().split('T')[0];

  const { data:payments } = await sb
    .from('gym_payments')
    .select('*')
    .eq('payment_date',d);

  let total = 0;

  payments.forEach(p=>{
    total += Number(p.amount || 0);
  });

  document.getElementById('todayCollection').innerText = total.toFixed(2);
}

async function loadPaymentMembers(){

  const { data } = await sb
    .from('gym_members')
    .select('*')
    .order('name');

  const select = document.getElementById('paymentMember');

  select.innerHTML = '';

  data.forEach(m=>{
    select.innerHTML += `
      <option value="${m.id}">
        ${String(m.name || '').toUpperCase()} - ${m.phone}
      </option>
    `;
  });
}

async function savePayment(){

  const member_id = document.getElementById('paymentMember').value;
  const amount = parseFloat(document.getElementById('paymentAmount').value || 0);

  if(amount <= 0){
    alert("Invalid Amount");
    return;
  }

  const today = new Date().toISOString().split('T')[0];

  const { error } = await sb
    .from('gym_payments')
    .insert([{
      member_id,
      amount,
      payment_date:today
    }]);

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById('paymentAmount').value = '';

  loadPayments();
  loadDashboard();

  alert("Payment Saved");
}

async function loadPayments(){

  const { data } = await sb
    .from('gym_payments')
    .select(`
      *,
      gym_members(name,phone)
    `)
    .order('id',{ascending:false})
    .limit(20);

  const div = document.getElementById('paymentList');

  div.innerHTML = '';

  data.forEach(p=>{

    div.innerHTML += `
      <div class="member">
        <strong>${String(p.gym_members?.name || '').toUpperCase()}</strong><br>
        <small>${p.gym_members?.phone || ''}</small><br><br>

        Amount : ₹${p.amount}<br>
        Date : ${p.payment_date}
      </div>
    `;
  });
}

async function markAttendance(memberId, source){
  if(!memberId) return;

  const now = new Date();

  const { error } = await sb
    .from('gym_attendance')
    .insert([{
      member_id:memberId,
      attendance_date:todayText(),
      check_in_time:now.toISOString(),
      marked_by:source || currentUser?.username || 'APP'
    }]);

  if(error){
    console.log(error);
  }
}

async function loadAttendancePage(){
  await loadAttendanceMembers();
  await loadAttendance();
}

async function loadAttendanceMembers(){
  const { data, error } = await sb
    .from('gym_members')
    .select('*')
    .order('name');

  if(error){
    alert(error.message);
    return;
  }

  const select = document.getElementById('attendanceMemberSelect');
  select.innerHTML = '';

  data.forEach(member => {
    select.innerHTML += `
      <option value="${member.id}">
        ${String(member.name || '').toUpperCase()} - ${member.phone}
      </option>
    `;

async function markAttendanceForSelectedMember(){
  const memberId = document.getElementById('attendanceMemberSelect').value;

  if(!memberId){
    alert('Select member');
    return;
  }

  await markAttendance(memberId, currentUser?.username || 'STAFF');
  await loadAttendance();

async function loadAttendance(){
  const { data, error } = await sb
    .from('gym_attendance')
    .select(`
      *,
      gym_members(name,phone)
    `)
    .order('check_in_time', { ascending:false })

        Date : ${row.attendance_date}<br>
        Time : ${new Date(row.check_in_time).toLocaleTimeString()}<br>

async function loadWorkoutPage(){
  const nameEl = document.getElementById('workoutMemberName');
  const statusEl = document.getElementById('workoutMemberStatus');
  const pickerWrap = document.getElementById('workoutMemberPickerWrap');
  const editorCard = document.getElementById('workoutEditorCard');
  const isMember = currentUser.role === 'member';

  nameEl.innerText = currentUser?.displayName || '-';
  statusEl.innerText = 'ACTIVE';
  statusEl.style.color = '#22c55e';

  clearWorkoutForm();
  toggleWorkoutFields();
  editorCard.classList.toggle('hidden', isMember);

  if(isMember){
    pickerWrap.classList.add('hidden');

    if(!currentUser?.memberId) return;

    const { data } = await sb
      .from('gym_members')
      .select('*')
      .eq('id', currentUser.memberId)
      .single();

    if(!data) return;

    const expired = new Date(data.expiry_date) < new Date();

    if(expired){
      logout();
      showExpiredLoginWarning(data);
      return;
    }

    selectedWorkoutMember = data;
  }else{
    pickerWrap.classList.remove('hidden');
    await loadWorkoutMemberOptions();
  }

  renderSelectedWorkoutMember();
  await renderWorkouts();
}

async function loadWorkoutMemberOptions(){
  const select = document.getElementById('workoutMemberSelect');

  const { data, error } = await sb
    .from('gym_members')
    .select('*')
    .order('name');

  if(error){
    alert(error.message);
    return;
  }

  select.innerHTML = '';

  data.forEach(member => {
    select.innerHTML += `
      <option value="${member.id}">
        ${String(member.name || '').toUpperCase()} - ${member.phone}
      </option>
    `;
  });

  const selectedId = select.value || data[0]?.id;
  selectedWorkoutMember = data.find(member => String(member.id) === String(selectedId)) || data[0] || null;
}

async function changeWorkoutMember(){
  const id = document.getElementById('workoutMemberSelect').value;

  const { data } = await sb
    .from('gym_members')
    .select('*')
    .eq('id', id)
    .single();

  if(!data) return;

  selectedWorkoutMember = data;
  clearWorkoutForm();
  renderSelectedWorkoutMember();
  await renderWorkouts();
}

function renderSelectedWorkoutMember(){
  const nameEl = document.getElementById('workoutMemberName');
  const statusEl = document.getElementById('workoutMemberStatus');

  if(!selectedWorkoutMember){
    nameEl.innerText = '-';
    statusEl.innerText = '-';
    return;
  }

  const expired = new Date(selectedWorkoutMember.expiry_date) < new Date();

  nameEl.innerText = String(selectedWorkoutMember.name || '').toUpperCase();
  statusEl.innerText = expired ? 'EXPIRED' : 'ACTIVE';
  statusEl.style.color = expired ? '#ef4444' : '#22c55e';
}

function toggleWorkoutFields(){
  const type = document.getElementById('workoutType').value;
  document.getElementById('strengthFields').classList.toggle('hidden', type !== 'strength');
  document.getElementById('cardioFields').classList.toggle('hidden', type !== 'cardio');
}

function clearWorkoutForm(){
  document.getElementById('workoutEditId').value = '';
  document.getElementById('workoutDay').value = '1';
  document.getElementById('workoutFocus').value = '';
  document.getElementById('workoutName').value = '';
  document.getElementById('workoutType').value = 'strength';
  document.getElementById('targetWeight').value = '';
  document.getElementById('targetReps').value = '';
  document.getElementById('targetRounds').value = '';
  document.getElementById('targetTime').value = '';
  document.getElementById('workoutMsg').innerHTML = '';
}

async function saveWorkout(){
  if(currentUser.role === 'member'){
    alert('Only staff or owner can add workouts');
    return;
  }

  if(!selectedWorkoutMember){
    alert('Select member');
    return;
  }

  const id = document.getElementById('workoutEditId').value;
  const day_no = Number(document.getElementById('workoutDay').value || 1);
  const focus = document.getElementById('workoutFocus').value.trim().toUpperCase();
  const name = document.getElementById('workoutName').value.trim().toUpperCase();
  const type = document.getElementById('workoutType').value;

  if(!name){
    alert('Enter workout name');
    return;
  }

  const item = {
    member_id:selectedWorkoutMember.id,
    day_no,
    focus,
    name,
    type,
    target_weight: document.getElementById('targetWeight').value || null,
    target_reps: document.getElementById('targetReps').value || null,
    target_rounds: document.getElementById('targetRounds').value || null,
    target_time_minutes: document.getElementById('targetTime').value || null
  };

  const query = id
    ? sb.from('gym_workouts').update(item).eq('id', id)
    : sb.from('gym_workouts').insert([item]);

  const { error } = await query;

  if(error){
    alert(error.message);
    return;
  }

  clearWorkoutForm();
  document.getElementById('workoutViewDay').value = String(day_no);
  document.getElementById('workoutMsg').innerHTML = '<div class="success">Workout Saved</div>';
  await renderWorkouts();
}

async function loadSixDayPlan(){
  if(currentUser.role === 'member'){
    alert('Only staff or owner can add workouts');
    return;
  }

  if(!selectedWorkoutMember){
    alert('Select member');
    return;
  }

  if(!confirm('Load full 6 day workout plan for this member?')) return;

  const { data:templates, error:templateError } = await sb
    .from('gym_workout_templates')
    .select('*')
    .order('day_no', { ascending:true })
    .order('id', { ascending:true });

  if(templateError){
    alert(templateError.message);
    return;
  }

  if(!templates.length){
    alert('No workout templates found in Supabase');
    return;
  }

  const rows = templates.map(template => ({
    member_id:selectedWorkoutMember.id,
    day_no:template.day_no,
    focus:template.focus,
    name:template.name,
    type:template.type || 'strength',
    target_weight:template.target_weight,
    target_reps:template.target_reps,
    target_rounds:template.target_rounds,
    target_time_minutes:template.target_time_minutes
  }));

  const { error } = await sb
    .from('gym_workouts')
    .insert(rows);

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById('workoutMsg').innerHTML = '<div class="success">6 Day Plan Loaded</div>';
  await renderWorkouts();
}

async function editWorkout(id){
  if(currentUser.role === 'member'){
    alert('Only staff or owner can edit workouts');
    return;
  }

  const { data:item, error } = await sb
    .from('gym_workouts')
    .select('*')
    .eq('id', id)
    .single();

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById('workoutEditId').value = item.id;
  document.getElementById('workoutDay').value = item.day_no || 1;
  document.getElementById('workoutFocus').value = item.focus || '';
  document.getElementById('workoutName').value = item.name;
  document.getElementById('workoutType').value = item.type;
  document.getElementById('targetWeight').value = item.target_weight || '';
  document.getElementById('targetReps').value = item.target_reps || '';
  document.getElementById('targetRounds').value = item.target_rounds || '';
  document.getElementById('targetTime').value = item.target_time_minutes || '';
  toggleWorkoutFields();
}

async function deleteWorkout(id){
  if(currentUser.role === 'member'){
    alert('Only staff or owner can delete workouts');
    return;
  }

  if(!confirm('Delete Workout?')) return;

  const { error } = await sb
    .from('gym_workouts')
    .delete()
    .eq('id', id);

  if(error){
    alert(error.message);
    return;
  }

  await renderWorkouts();
}

async function updateWorkoutProgress(id, field, value){
  const { error } = await sb
    .from('gym_workouts')
    .update({ [field]: value || null })
    .eq('id', id);

  if(error){
    alert(error.message);
  }
}

async function toggleWorkoutDone(id, checked){
  const { error } = await sb
    .from('gym_workouts')
    .update({
      done: checked,
      done_at: checked ? new Date().toISOString() : null
    })
    .eq('id', id);

  if(error){
    alert(error.message);
    return;
  }

  await renderWorkouts();
}

function startWorkoutTimer(id){
  if(workoutTimers[id]){
    clearInterval(workoutTimers[id]);
  }

  let seconds = 60;
  const text = document.getElementById(`timer-${id}`);

  if(!text) return;

  text.innerText = '01:00';

  workoutTimers[id] = setInterval(() => {
    seconds--;
    const mins = String(Math.floor(seconds / 60)).padStart(2,'0');
    const secs = String(seconds % 60).padStart(2,'0');
    text.innerText = `${mins}:${secs}`;

    if(seconds <= 0){
      clearInterval(workoutTimers[id]);
      delete workoutTimers[id];
      text.innerText = 'TIME UP';
      playTimerAlarm();
      alert('1 MINUTE TIMER FINISHED');
    }
  }, 1000);
}

async function renderWorkouts(){
  const div = document.getElementById('workoutList');
  const dayNo = Number(document.getElementById('workoutViewDay').value || 1);
  const canManageWorkouts = currentUser.role !== 'member';

  if(!selectedWorkoutMember){
    div.innerHTML = '<div class="muted">Select a member</div>';
    return;
  }

  const { data:items, error } = await sb
    .from('gym_workouts')
    .select('*')
    .eq('member_id', selectedWorkoutMember.id)
    .eq('day_no', dayNo)
    .order('day_no', { ascending:true })
    .order('id', { ascending:true });

  if(error){
    alert(error.message);
    return;
  }

  if(!items.length){
    div.innerHTML = `<div class="muted">No workouts added for day ${dayNo}</div>`;
    return;
  }

  div.innerHTML = '';

  items.forEach(item => {
    const progressFields = item.type === 'cardio'
      ? `
        <div class="workout-meta">
          <label>Rounds Done<input type="number" value="${item.actual_rounds || ''}" onchange="updateWorkoutProgress('${item.id}','actual_rounds',this.value)"></label>
          <label>Time Minutes<input type="number" value="${item.actual_time_minutes || ''}" onchange="updateWorkoutProgress('${item.id}','actual_time_minutes',this.value)"></label>
        </div>
      `
      : `
        <div class="workout-meta">
          <label>Weight Done<input type="number" value="${item.actual_weight || ''}" onchange="updateWorkoutProgress('${item.id}','actual_weight',this.value)"></label>
          <label>Reps / Times<input type="number" value="${item.actual_reps || ''}" onchange="updateWorkoutProgress('${item.id}','actual_reps',this.value)"></label>
        </div>
      `;

    const target = item.type === 'cardio'
      ? `Target : ${item.target_rounds || 0} rounds, ${item.target_time_minutes || 0} minutes`
      : `Target : ${item.target_weight || 0} weight, ${item.target_reps || 0} reps / times`;

    const manageButtons = canManageWorkouts
      ? `
        <div class="actions">
          <button onclick="editWorkout('${item.id}')">Edit</button>
          <button class="deleteBtn" onclick="deleteWorkout('${item.id}')">Delete</button>
        </div>
      `
      : '';

    div.innerHTML += `
      <div class="workout-row">
        <small>DAY ${item.day_no || 1}${item.focus ? ' - ' + item.focus : ''}</small><br>
        <strong>${item.name}</strong><br>
        <small>${target}</small>
        ${progressFields}
        <label style="display:block;margin-top:8px;">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleWorkoutDone('${item.id}',this.checked)" style="width:auto;margin-right:6px;">
          Mark Done
        </label>
        ${item.done ? `<span class="doneBadge">DONE ${item.done_at ? new Date(item.done_at).toLocaleString() : ''}</span>` : ''}
        <div>
          <button onclick="startWorkoutTimer('${item.id}')">Start 1 Min Timer</button>
          <span id="timer-${item.id}" class="timerText">01:00</span>
        </div>
        ${manageButtons}
      </div>
    `;
  });
}

document.getElementById('joinDate').value =
  new Date().toISOString().split('T')[0];

async function initApp(){
  logout();
}

initApp();
